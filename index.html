<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marina · 15 Anos</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay"></div>

    <div class="hero-content fade">
        <p class="tag">15 ANOS</p>
            <h1 id="nome"></h1>
                <p id="dataTexto"></p>

                    <div class="countdown">
                          <div><span id="dias">--</span><small>Dias</small></div>
                                <div><span id="horas">--</span><small>Horas</small></div>
                                      <div><span id="min">--</span><small>Min</small></div>
                                            <div><span id="seg">--</span><small>Seg</small></div>
                                                </div>
                                                  </div>
                                                  </section>

                                                  <!-- GALERIA -->
                                                  <section class="section">
                                                    <h2 class="title fade">Momentos</h2>

                                                      <div class="gallery fade">
                                                          <img src="img/foto7.jpg">
                                                              <img src="img/foto3.jpg">
                                                                  <img src="img/foto5.jpg">
                                                                      <img src="img/foto2.jpg">
                                                                          <img src="img/foto4.jpg">
                                                                              <img src="img/foto6.jpg">
                                                                                  <img src="img/foto1.jpg">
                                                                                    </div>
                                                                                    </section>

                                                                                    <!-- INFO -->
                                                                                    <section class="section">
                                                                                      <div class="info fade">
                                                                                          <h3 id="local"></h3>
                                                                                              <p id="cidade"></p>

                                                                                                  <a id="mapsBtn" class="btn" target="_blank">Ver localização</a>
                                                                                                    </div>
                                                                                                    </section>

                                                                                                    <!-- RSVP -->
                                                                                                    <section class="section">
                                                                                                      <div class="info fade">
                                                                                                          <h3>Confirmar Presença</h3>

                                                                                                              <input id="nomeConvidado" placeholder="Seu nome">

                                                                                                                  <button onclick="confirmar()" class="btn">
                                                                                                                        Confirmar via WhatsApp
                                                                                                                            </button>
                                                                                                                              </div>
                                                                                                                              </section>

                                                                                                                              <script src="script.js"></script>

                                                                                                                              </body>
                                                                                                                              </html>
